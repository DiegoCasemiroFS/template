spring.application.name=template
spring.profiles.active=dev

# Le o arquivo .env (formato de properties) sem precisar de lib externa.
# "optional" evita erro de boot caso o arquivo nao exista (ex: em producao).
spring.config.import=optional:file:.env[.properties]

# ---- Banco (valores vem do .env / variaveis de ambiente) ----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ---- JPA / Hibernate ----
# O schema e gerenciado pelo Liquibase, entao o Hibernate fica de fora.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# ---- Liquibase (migrations em YAML) ----
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ---- Mensagens de validacao (i18n) ----
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ---- Swagger / OpenAPI ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---- Actuator ----
management.endpoints.web.exposure.include=health

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000
app.jwt.issuer=template

# ---- CORS ----
app.cors.allowed-origins=http://localhost:3000
